              </div>
              <div>
                <select id="chose" required class="form-control">

                  <option value="delivery">Delivery</option>
                </select>
              </div>
              <div class="map">
                <input type="text" id="map" name="map" class="form-control" placeholder="Your location" />
                <span>RM5 for delivery</span>
              </div>
              <div class="btn_box">
                <button type="submit">Book Now</button>
              </div>
            </form>
